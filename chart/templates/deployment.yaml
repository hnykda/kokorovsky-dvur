apiVersion: apps/v1
kind: Deployment
metadata:
  name: kokorovskydvur
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: kokorovskydvur
  template:
    metadata:
      labels:
        app: kokorovskydvur
    spec:
      containers:
        - name: kokorovskydvur
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
